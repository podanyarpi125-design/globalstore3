<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termékek - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; border-radius: 24px; width: 100%; max-width: 500px; padding: 28px; position: relative; border: 1px solid #334155; }
        .close-modal { position: absolute; top: 20px; right: 24px; color: #94a3b8; cursor: pointer; font-size: 24px; }
        input, textarea { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 10px 14px; color: white; width: 100%; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #94a3b8; }
        .product-card { background: #0f172a; border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid #334155; }
    </style>
</head>
<body class="p-4">
    <nav class="bg-[#1e293b] p-4 rounded-xl mb-6 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="/admin" class="text-gray-400 hover:text-white"><i class="fas fa-arrow-left"></i> Vissza</a>
            <h1 class="text-xl font-bold">Termékek kezelése</h1>
        </div>
        <button onclick="openAddModal()" class="bg-green-600 hover:bg-green-500 px-5 py-2 rounded-lg">
            <i class="fas fa-plus"></i> Új termék
        </button>
    </nav>

    <div class="space-y-3">
        {% for p in products %}
        <div class="product-card">
            <div class="flex justify-between items-start">
                <div>
                    <div class="font-mono text-xs text-gray-400">{{ p.sku }}</div>
                    <div class="font-bold">{{ p.name }}</div>
                    <div class="text-sm text-gray-400">Kategória: {{ p.category or '-' }}</div>
                </div>
                <div class="text-right">
                    <div class="text-green-400 text-lg font-bold">${{ "%.2f"|format(p.price) }}</div>
                    <div class="text-xs text-gray-500">DailyStore: ${{ "%.2f"|format(p.daily_store_price) }}</div>
                    <span class="text-xs px-2 py-0.5 rounded-full {% if p.is_active %}bg-green-500/20 text-green-400{% else %}bg-red-500/20 text-red-400{% endif %}">
                        {{ 'Aktív' if p.is_active else 'Inaktív' }}
                    </span>
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-3 pt-2 border-t border-dark-700">
                <button onclick="editProduct({{ p.id }})" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded text-sm">Szerkesztés</button>
                <button onclick="deleteProduct({{ p.id }}, '{{ p.name }}')" class="bg-red-600 hover:bg-red-500 px-3 py-1 rounded text-sm">Törlés</button>
            </div>
        </div>
        {% endfor %}
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" onclick="closeModal()"></i>
            <h2 class="text-2xl font-bold mb-5" id="modalTitle">Új termék</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="mb-4"><label>SKU *</label><input type="text" id="sku" required placeholder="pl: netflix-lifetime"></div>
                <div class="mb-4"><label>Termék név *</label><input type="text" id="name" required></div>
                <div class="mb-4"><label>Eladási ár ($) *</label><input type="number" id="price" step="0.01" required></div>
                <div class="mb-4"><label>DailyStore ár ($)</label><input type="number" id="dailyStorePrice" step="0.01"></div>
                <div class="mb-4"><label>Leírás</label><textarea id="description" rows="2"></textarea></div>
                <div class="mb-4"><label>Kategória</label><input type="text" id="category"></div>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-blue-600 py-3 rounded-xl font-semibold">Mentés</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-600 py-3 rounded-xl font-semibold">Mégse</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentProductId = null;
        
        function openAddModal() {
            currentProductId = null;
            document.getElementById('modalTitle').innerText = 'Új termék';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('productModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }
        
        async function editProduct(id) {
            try {
                const res = await fetch(`/api/products/${id}`);
                if (!res.ok) throw new Error('Hiba');
                const product = await res.json();
                currentProductId = id;
                document.getElementById('modalTitle').innerText = 'Termék szerkesztése';
                document.getElementById('productId').value = product.id;
                document.getElementById('sku').value = product.sku;
                document.getElementById('name').value = product.name;
                document.getElementById('price').value = product.price;
                document.getElementById('dailyStorePrice').value = product.daily_store_price;
                document.getElementById('description').value = product.description || '';
                document.getElementById('category').value = product.category || '';
                document.getElementById('productModal').classList.add('active');
            } catch (err) {
                alert('Hiba: ' + err.message);
            }
        }
        
        async function deleteProduct(id, name) {
            if (!confirm(`Törlöd a "${name}" terméket?`)) return;
            try {
                const res = await fetch(`/admin/products/delete/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) location.reload();
                else alert('Hiba: ' + data.error);
            } catch (err) {
                alert('Hiba: ' + err.message);
            }
        }
        
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const productId = document.getElementById('productId').value;
            const price = parseFloat(document.getElementById('price').value);
            const dailyStorePrice = parseFloat(document.getElementById('dailyStorePrice').value) || price;
            const data = {
                sku: document.getElementById('sku').value.trim(),
                name: document.getElementById('name').value.trim(),
                price: price,
                daily_store_price: dailyStorePrice,
                description: document.getElementById('description').value,
                category: document.getElementById('category').value
            };
            if (!data.sku || !data.name || isNaN(data.price) || data.price <= 0) {
                alert('Kötelező mezők: SKU, név, ár');
                return;
            }
            try {
                let url, method;
                if (productId) {
                    url = `/admin/products/update/${productId}`;
                    method = 'PUT';
                } else {
                    url = '/admin/products/add';
                    method = 'POST';
                }
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const result = await res.json();
                if (result.success) location.reload();
                else alert('Hiba: ' + result.error);
            } catch (err) {
                alert('Hiba: ' + err.message);
            }
        });
        
        window.onclick = (e) => { if (e.target.classList.contains('modal')) closeModal(); };
    </script>
</body>
</html>
