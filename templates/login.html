<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GlobalStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        primary: { 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-dark-800 rounded-2xl p-8 border border-dark-700 shadow-2xl">
        <div class="text-center mb-8">
            <a href="/" class="text-2xl font-bold text-white flex items-center justify-center gap-2 mb-2">
                <i class="fas fa-cube text-primary-500"></i> GlobalStore
            </a>
            <p class="text-gray-400">Welcome back!</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="bg-red-500/10 text-red-400 p-3 rounded-lg mb-4">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-2">Username</label>
                <input type="text" name="username" required 
                       class="w-full bg-dark-900 border border-dark-700 rounded-lg py-3 px-4 text-white">
            </div>
            <div class="mb-6">
                <label class="block text-gray-400 text-sm mb-2">Password</label>
                <input type="password" name="password" required 
                       class="w-full bg-dark-900 border border-dark-700 rounded-lg py-3 px-4 text-white">
            </div>
            <button type="submit" class="w-full bg-primary-600 py-3 rounded-lg font-bold">
                Login
            </button>
        </form>
        <p class="text-center mt-4 text-gray-400">
            No account? <a href="/register" class="text-primary-500">Register</a>
        </p>
    </div>
</body>
</html>
